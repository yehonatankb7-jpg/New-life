<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>New Life</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; user-select: none; }
        .header { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; border: 1px solid #eee; }
        .streak-label { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px; }
        .streak-num { font-size: 60px; font-weight: 800; color: #ff4b2b; margin: 0; line-height: 1; }
        .task-container { display: flex; flex-direction: column; gap: 12px; }
        .task { background: white; padding: 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #eee; transition: all 0.2s; }
        .task.done { background: #d1fae5; border-color: #10b981; opacity: 0.8; }
        .task.done span { text-decoration: line-through; color: #065f46; }
        .task-name { font-size: 18px; font-weight: 600; }
        .check-icon { font-size: 24px; }
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="header">
        <div class="streak-label">סטריק נוכחי</div>
        <p class="streak-num" id="streakDisplay">0</p>
        <h2 style="margin-top:15px; font-size: 20px;">New Life - חיים חדשים</h2>
    </div>

    <div class="task-container" id="taskList"></div>
    <div class="footer">בצע את כל המשימות כדי להעלות את הסטריק!</div>

    <script>
        const dailyTasks = ["🧘 מדיטציה", "🧘‍♂️ מתיחות (10 דק')", "❄️ מקלחת קרה", "✍️ כתיבה 5+ דק'", "📖 קריאה 5+ דק'", "💪 אימון 20 דק'"];
        const runs = { 0: "🏃‍♂️ ריצה 45 דק' קלה", 1: "🏃‍♂️ ריצה נורווגית", 3: "🏃‍♂️ ריצה 45 דק' קלה", 4: "🏃‍♂️ ריצה ספרינטים" };
        
        let streak = parseInt(localStorage.getItem('nl_streak')) || 0;
        let lastDate = localStorage.getItem('nl_lastDate') || "";
        document.getElementById('streakDisplay').innerText = streak;

        function render() {
            const day = new Date().getDay();
            const todayTasks = [...dailyTasks];
            if (runs[day]) todayTasks.push(runs[day]);
            
            const list = document.getElementById('taskList');
            list.innerHTML = todayTasks.map((t, i) => `
                <div class="task" onclick="toggle(${i})" id="t-${i}">
                    <span class="task-name">${t}</span>
                    <span class="check-icon" id="check-${i}">⬜</span>
                </div>
            `).join('');
        }

        function toggle(i) {
            const el = document.getElementById(`t-${i}`);
            const check = document.getElementById(`check-${i}`);
            el.classList.toggle('done');
            check.innerText = el.classList.contains('done') ? '✅' : '⬜';
            checkStatus();
        }

        function checkStatus() {
            const all = document.querySelectorAll('.task');
            const done = document.querySelectorAll('.task.done');
            const todayStr = new Date().toLocaleDateString();

            if (all.length === done.length && lastDate !== todayStr) {
                streak++;
                lastDate = todayStr;
                localStorage.setItem('nl_streak', streak);
                localStorage.setItem('nl_lastDate', todayStr);
                document.getElementById('streakDisplay').innerText = streak;
                alert("מדהים! הסטריק עלה ל-" + streak + " 🔥");
            }
        }
        render();
    </script>
</body>
</html>
