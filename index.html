<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>New Life - Dark Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #3b82f6; --success: #10b981; --accent: #ff4b2b; }
        body { font-family: -apple-system, system-ui; background: var(--bg); margin: 0; padding: 15px; color: var(--text); user-select: none; text-align: right; }
        
        .timer-icon { position: absolute; top: 25px; left: 20px; font-size: 24px; cursor: pointer; z-index: 100; background: var(--card); padding: 10px; border-radius: 50%; border: 1px solid #334155; }
        
        .card { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; margin-bottom: 15px; border: 1px solid #334155; position: relative; }
        .date-display { font-size: 13px; color: #94a3b8; font-weight: 600; }
        .streak-num { font-size: 55px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .quote { font-style: italic; font-size: 13px; color: #94a3b8; margin: 10px 0; min-height: 40px; }

        .progress-bg { background: #334155; height: 10px; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .progress-fill { background: linear-gradient(90deg, var(--primary), var(--success)); height: 100%; transition: width 0.5s ease; width: 0%; }
        
        /* עיצוב המשימה */
        .task { 
            background: var(--card); 
            padding: 18px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #334155; 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent; /* מונע ריבוע כחול בלחיצה באייפון */
        }
        .task.done { background: rgba(16, 185, 129, 0.1); border-color: var(--success); }
        .task.done span { text-decoration: line-through; color: var(--success); opacity: 0.6; }

        .play-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px; 
            margin-left: 15px;
            z-index: 5;
        }
        .play-btn.playing { background: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #timerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; border: 1px solid #334155; }
        .timer-display { font-size: 60px; font-weight: bold; margin: 20px 0; color: var(--text); }
        .modal-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 18px; margin: 8px 0; font-weight: bold; width: 100%; font-size: 18px; }
    </style>
</head>
<body>

    <div class="timer-icon" onclick="openTimer()">⏱️</div>

    <div class="card">
        <div id="currentDate" class="date-display"></div>
        <p style="margin:0; font-size: 11px; color:#64748b;">סטריק נוכחי</p>
        <p class="streak-num" id="streakDisplay">0</p>
        <div id="dailyQuote" class="quote"></div>
        <div class="progress-bg"><div id="progressFill" class="progress-fill"></div></div>
        <div id="percentLabel" style="font-size:11px; margin-top:8px; font-weight:bold; color: #94a3b8;"></div>
    </div>

    <div id="taskList"></div>

    <audio id="meditationAudio" src="meditation.mp3.mp3" preload="auto"></audio>

    <div id="timerModal">
        <div class="modal-content">
            <div id="timerDisplay" class="timer-display">00:00</div>
            <div id="timerOptions">
                <button class="modal-btn" onclick="startTimer(120)">2 דק' פלאנק</button>
                <button class="modal-btn" onclick="startTimer(1200)">20 דק' אימון</button>
            </div>
            <button id="stopBtn" class="modal-btn" style="display:none; background:var(--accent);" onclick="stopTimer()">עצור</button>
            <button class="modal-btn" style="background:#334155;" onclick="closeTimer()">סגור</button>
        </div>
    </div>

    <script>
        const START_DATE = new Date("2026-03-05");
        const TOTAL_DAYS = 75;
        const quotes = ["המשמעת היא החופש.", "אל תפסיק כשקשה.", "תהיה חזק מהתירוץ שלך."];
        
        const dailyBasics = ["🧘 מדיטציה", "❄️ מקלחת קרה", "✍️ כתיבה 5+ דק'", "📖 קריאה 5+ דק'", "Plank ⏱️"];
        const train = {0:"💪 פלג גוף עליון", 1:"💪 חיזוקים + ליבה", 2:"💪 פלג גוף תחת", 3:"💪 פלג גוף עליון", 4:"💪 חיזוקים + ליבה", 5:"💪 חיזוקים מיוחדים", 6:"🧘‍♂️ מתיחות 20 דק'"};
        const runs = {0:"🏃‍♂️ ריצה 45 דק'", 1:"🏃‍♂️ נורווגית", 3:"🏃‍♂️ ריצה 45 דק'", 4:"🏃‍♂️ ספרינטים"};

        let streak = parseInt(localStorage.getItem('nl_streak')) || 0;
        let completedTasks = JSON.parse(localStorage.getItem('nl_completedTasks')) || [];
        const audio = document.getElementById('meditationAudio');

        function init() {
            const today = new Date();
            document.getElementById('currentDate').innerText = today.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
            
            const diffDays = Math.max(0, Math.ceil((today - START_DATE) / 86400000));
            const p = Math.min(100, Math.round((diffDays/TOTAL_DAYS)*100));
            document.getElementById('progressFill').style.width = p + "%";
            document.getElementById('percentLabel').innerText = p + "% מהאתגר עבר";
            document.getElementById('dailyQuote').innerText = `"${quotes[today.getDate() % quotes.length]}"`;
            
            if (localStorage.getItem('nl_lastDate') !== today.toLocaleDateString()) {
                completedTasks = [];
                localStorage.setItem('nl_completedTasks', JSON.stringify([]));
                localStorage.setItem('nl_lastDate', today.toLocaleDateString());
            }

            audio.onended = () => {
                if (!completedTasks.includes("🧘 מדיטציה")) toggle("🧘 מדיטציה");
            };
            render();
        }

        function render() {
            const day = new Date().getDay();
            let tasks = [...dailyBasics];
            if (day !== 6) tasks.push("🧘‍♂️ מתיחות (10 דק')");
            tasks.push(train[day]);
            if (runs[day]) tasks.push(runs[day]);

            const list = document.getElementById('taskList');
            list.innerHTML = ""; // ניקוי הרשימה

            tasks.forEach(t => {
                const isDone = completedTasks.includes(t);
                const isMed = t.includes("מדיטציה");
                
                const taskDiv = document.createElement('div');
                taskDiv.className = `task ${isDone ? 'done' : ''}`;
                
                // הפיכת כל השורה ללחיצה
                taskDiv.onclick = () => toggle(t);

                taskDiv.innerHTML = `
                    <div style="display:flex; align-items:center; flex:1">
                        <span style="font-weight:500; font-size:17px;">${t}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        ${isMed && !isDone ? `<button id="pBtn" class="play-btn">▶</button>` : ''}
                        <span style="font-size:24px; margin-right:15px;">${isDone ? '✅' : '⬜'}</span>
                    </div>
                `;

                // טיפול בכפתור פליי בנפרד כדי שלא יתנגש עם הלחיצה על השורה
                if (isMed && !isDone) {
                    const btn = taskDiv.querySelector('#pBtn');
                    btn.onclick = (e) => {
                        e.stopPropagation(); // מונע מהשורה להסתמן כ-V כשלוחצים פליי
                        playMed();
                    };
                }

                list.appendChild(taskDiv);
            });

            document.getElementById('streakDisplay').innerText = streak;
        }

        function playMed() {
            const btn = document.getElementById('pBtn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "⏸";
                btn.classList.add('playing');
            } else {
                audio.pause();
                btn.innerText = "▶";
                btn.classList.remove('playing');
            }
        }

        function toggle(name) {
            const idx = completedTasks.indexOf(name);
            if (idx === -1) completedTasks.push(name);
            else completedTasks.splice(idx, 1);
            localStorage.setItem('nl_completedTasks', JSON.stringify(completedTasks));
            render();
            checkWin();
        }

        function checkWin() {
            const day = new Date().getDay();
            const todayStr = new Date().toLocaleDateString();
            const req = dailyBasics.length + 1 + (day !== 6 ? 1 : 0) + (runs[day] ? 1 : 0);
            if (completedTasks.length === req && localStorage.getItem('nl_win_' + todayStr) !== "y") {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                streak++;
                localStorage.setItem('nl_streak', streak);
                localStorage.setItem('nl_win_' + todayStr, "y");
                setTimeout(() => { render(); alert("יום מושלם! 🔥"); }, 500);
            }
        }

        function openTimer() { document.getElementById('timerModal').style.display = 'flex'; }
        function closeTimer() { document.getElementById('timerModal').style.display = 'none'; }
        function startTimer(s) {
            document.getElementById('timerOptions').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            let timeLeft = s;
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60), sc = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); alert("הזמן נגמר!"); stopTimer(); }
            }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); document.getElementById('timerOptions').style.display = 'block'; document.getElementById('stopBtn').style.display = 'none'; document.getElementById('timerDisplay').innerText = "00:00"; }

        init();
    </script>
</body>
</html>
